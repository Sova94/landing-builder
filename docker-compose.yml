version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: landing-builder-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: landing_builder
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - landing-builder-network

  redis:
    image: redis:7-alpine
    container_name: landing-builder-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - landing-builder-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: landing-builder-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=landing_builder
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    ports:
      - '4000:4000'
    depends_on:
      - postgres
      - redis
    networks:
      - landing-builder-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: landing-builder-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:4000/api
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - landing-builder-network

volumes:
  postgres_data:
  redis_data:

networks:
  landing-builder-network:
    driver: bridge
